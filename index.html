<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background">
        <div id="title">
            <h1>SkyCast!</h1>
            <p>Get the latest weather updates at your fingertips.</p>
        </div>
        <img src="https://images.unsplash.com/photo-1531147646552-1eec68116469?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Background Image" id="bgimg">
        <div class="search-box">
            <img src="./Images/location.png" id="locationimg">
            <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">
            <button id="search-btn">Search!</button>
        </div>
        <div id="weather-card">
            <div class="weather-info">
                <div id="current-location">
                    <img src="./Images/location.png" id="locationimg1">
                    <p id="location">Michael Nagar, Madhyamgram, Kolkata</p>
                </div>
                <div id="temp">
                    <div id="tmp">

                        <h1 id="temperature">30°C</h1>
                        <div id="weather-description">
                            <p id="description">Clear Sky</p>
                        </div>
                    </div>
                    <img src="./Images/sun.png" id="weather-icon">
                </div>
                <hr id="divider">
                <div class="stats">
                    <div class="firsttwo">

                        <div id="humidity">
                            <h3>Humidity</h3>
                            <p>65%</p>
                        </div>
                        <div id="precipitation">
                            <h3>Precipitation</h3>
                            <p>65%</p>
                        </div>
                    </div>
                    <div class="secondtwo">

                        <div id="uv">
                            <h3>UV Index</h3>
                            <p>65%</p>
                        </div>
                        <div id="Wind-Speed">
                            <h3>Wind-Speed</h3>
                            <p>65%</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
    <script src="first.js"></script>
</body>
</html>
